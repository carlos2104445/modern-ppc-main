apiVersion: v1
kind: Service
metadata:
  name: modern-ppc-service
  namespace: modern-ppc
  labels:
    app: modern-ppc
    component: backend
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    prometheus.io/scrape: "true"
    prometheus.io/port: "5000"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app: modern-ppc
    component: backend
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: modern-ppc
  labels:
    app: postgres
    component: database
spec:
  type: ClusterIP
  selector:
    app: postgres
    component: database
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: modern-ppc
  labels:
    app: redis
    component: cache
spec:
  type: ClusterIP
  selector:
    app: redis
    component: cache
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: modern-ppc-headless
  namespace: modern-ppc
  labels:
    app: modern-ppc
    component: backend
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: modern-ppc
    component: backend
  ports:
    - name: http
      port: 5000
      targetPort: http
      protocol: TCP
