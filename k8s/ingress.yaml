apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: modern-ppc-ingress
  namespace: modern-ppc
  labels:
    app: modern-ppc
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "10"
    
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://modernppc.com"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Permissions-Policy: geolocation=(), microphone=(), camera=()";
    
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-protocols: "TLSv1.2 TLSv1.3"
    nginx.ingress.kubernetes.io/ssl-ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384"
    
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    
    nginx.ingress.kubernetes.io/websocket-services: "modern-ppc-service"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    
    nginx.ingress.kubernetes.io/enable-opentracing: "true"
spec:
  tls:
    - hosts:
        - modernppc.com
        - www.modernppc.com
        - api.modernppc.com
      secretName: modern-ppc-tls
  rules:
    - host: modernppc.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: modern-ppc-service
                port:
                  number: 80
    
    - host: www.modernppc.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: modern-ppc-service
                port:
                  number: 80
    
    - host: api.modernppc.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: modern-ppc-service
                port:
                  number: 80

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: modern-ppc-ingress-staging
  namespace: modern-ppc
  labels:
    app: modern-ppc
    environment: staging
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: staging-basic-auth
    nginx.ingress.kubernetes.io/auth-realm: "Authentication Required - Staging Environment"
spec:
  tls:
    - hosts:
        - staging.modernppc.com
      secretName: modern-ppc-staging-tls
  rules:
    - host: staging.modernppc.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: modern-ppc-service
                port:
                  number: 80
